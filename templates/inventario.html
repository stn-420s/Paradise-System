<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario | Paradise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

    <div class="container mt-4">
        <a href="/" class="btn btn-outline-light mb-3">⬅ Volver al Inicio</a>
        
        <div class="card bg-secondary text-light">
            <div class="card-header bg-info text-dark fw-bold">
                <h5 class="mb-0">📊 Control de Inventario</h5>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-dark table-hover table-bordered align-middle text-center">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Stock Disponible</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in inventario %}
                        <tr>
                            <td class="fw-bold">{{ item.ID_Producto }}</td>
                            <td class="text-start fw-bold">{{ item.Nombre }}</td>
                            <td class="fs-5 text-success fw-bold">{{ item.Stock_Actual }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
