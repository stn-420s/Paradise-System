<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Movimientos | Paradise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

    <div class="container mt-4">
        <a href="/" class="btn btn-outline-light mb-3">⬅ Volver al Inicio</a>
        
        {% if mensaje %}
            <div class="alert alert-danger text-dark"><strong>{{ mensaje }}</strong></div>
        {% endif %}

        <div class="row">
            <div class="col-md-4">
                <div class="card bg-secondary text-light mb-3">
                    <div class="card-header bg-primary text-white fw-bold">📦 Agregar a la lista</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Tipo</label>
                            <select id="select_tipo" class="form-select bg-dark text-light border-secondary">
                                <option value="Ingreso">Entrada 🟢 (+)</option>
                                <option value="Egreso">Salida 🔴 (-)</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label>Producto</label>
                            <select id="select_producto" class="form-select bg-dark text-light border-secondary">
                                <option value="" disabled selected>Selecciona...</option>
                                {% for prod in productos %}
                                    <option value="{{ prod.ID_Producto }}" data-nombre="{{ prod.Nombre }}">{{ prod.Nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label>Cantidad</label>
                            <input type="number" id="input_cantidad" class="form-control bg-dark text-light border-secondary" min="1" value="1">
                        </div>
                        
                        <div class="mb-3">
                            <label>Comentario</label>
                            <input type="text" id="input_comentario" class="form-control bg-dark text-light border-secondary" placeholder="Ej: inv, garantía...">
                        </div>
                        
                        <button type="button" class="btn btn-warning w-100 fw-bold" onclick="agregarMovimiento()">➕ Añadir a la lista</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card bg-secondary text-light">
                    <div class="card-header bg-info text-dark fw-bold">📝 Movimientos por guardar</div>
                    <div class="card-body">
                        <table class="table table-dark table-sm table-hover text-center align-middle">
                            <thead>
                                <tr>
                                    <th>Tipo</th>
                                    <th>Producto</th>
                                    <th>Cant</th>
                                    <th>Comentario</th>
                                    <th>Quitar</th>
                                </tr>
                            </thead>
                            <tbody id="tabla_movimientos">
                                </tbody>
                        </table>
                        
                        <hr>
                        <form method="POST" action="/movimientos" id="form_movimientos">
                            <input type="hidden" name="movimientos_datos" id="movimientos_datos">
                            <button type="button" class="btn btn-success w-100 fw-bold py-2 mt-2" onclick="enviarMovimientos()">✅ GUARDAR TODOS LOS REGISTROS</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let listaMovimientos = [];

        function agregarMovimiento() {
            let tipoSelect = document.getElementById('select_tipo');
            let productoSelect = document.getElementById('select_producto');
            
            let tipo = tipoSelect.value;
            let id_prod = productoSelect.value;
            let nombre = productoSelect.options[productoSelect.selectedIndex]?.getAttribute('data-nombre');
            let cantidad = document.getElementById('input_cantidad').value;
            let comentario = document.getElementById('input_comentario').value;

            if (!id_prod || !cantidad || !comentario) {
                alert("Por favor llena todos los campos, incluyendo el comentario.");
                return;
            }

            // Metemos el movimiento a la memoria
            listaMovimientos.push({
                tipo: tipo,
                id_producto: id_prod,
                nombre: nombre,
                cantidad: parseInt(cantidad),
                comentario: comentario
            });

            actualizarTabla();
            
            // Limpiamos campos
            document.getElementById('input_cantidad').value = 1;
            document.getElementById('input_comentario').value = "";
            productoSelect.value = "";
        }

        function quitarMovimiento(index) {
            listaMovimientos.splice(index, 1);
            actualizarTabla();
        }

        function actualizarTabla() {
            let tbody = document.getElementById('tabla_movimientos');
            tbody.innerHTML = "";

            listaMovimientos.forEach((item, index) => {
                let badge = item.tipo === 'Ingreso' ? '<span class="badge bg-success">Ingreso</span>' : '<span class="badge bg-danger">Egreso</span>';
                
                tbody.innerHTML += `
                    <tr>
                        <td>${badge}</td>
                        <td class="text-start">${item.nombre}</td>
                        <td class="fw-bold">${item.cantidad}</td>
                        <td>${item.comentario}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="quitarMovimiento(${index})">❌</button></td>
                    </tr>
                `;
            });
        }

        function enviarMovimientos() {
            if (listaMovimientos.length === 0) {
                alert("La lista está vacía. Agrega movimientos primero.");
                return;
            }
            // Convertimos a JSON y enviamos a Python
            document.getElementById('movimientos_datos').value = JSON.stringify(listaMovimientos);
            document.getElementById('form_movimientos').submit();
        }
    </script>
</body>
</html>
